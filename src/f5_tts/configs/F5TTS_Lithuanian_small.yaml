hydra:
  run:
    dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

datasets:
  name: lithuanian_processed # our processed Lithuanian dataset
  batch_size_per_gpu: 4800 # Much smaller for MPS memory constraints
  batch_size_type: frame # frame | sample
  max_samples: 8 # Very small batch for MPS
  num_workers: 2 # reduced for MPS

optim:
  epochs: 50 # More epochs for smaller dataset
  learning_rate: 1e-4 # Slightly higher learning rate for fine-tuning
  num_warmup_updates: 1000 # Reduced warmup for MPS
  grad_accumulation_steps: 4 # Accumulate gradients to simulate larger batch
  max_grad_norm: 1.0
  bnb_optimizer: False

model:
  name: F5TTS_Lithuanian
  tokenizer: custom # character-based tokenization for Lithuanian
  tokenizer_path: data/LT/vocab_lithuanian.txt # path to our Lithuanian vocabulary file
  backbone: DiT
  arch:
    dim: 512 # Reduced from 1024 for MPS
    depth: 12 # Reduced from 22 for MPS
    heads: 8 # Reduced from 16 for MPS
    ff_mult: 2
    text_dim: 256 # Reduced from 512 for MPS
    text_mask_padding: False
    conv_layers: 2 # Reduced from 4 for MPS
    pe_attn_head: 1
    attn_backend: torch
    attn_mask_enabled: False
    checkpoint_activations: True # Enable to save memory
  mel_spec:
    target_sample_rate: 24000
    n_mel_channels: 80 # Reduced from 100 for MPS
    hop_length: 256
    win_length: 1024
    n_fft: 1024
    mel_spec_type: vocos
  vocoder:
    is_local: False
    local_path: null

ckpts:
  logger: null
  log_samples: True
  save_per_updates: 5000
  keep_last_n_checkpoints: 5
  last_per_updates: 1000
  save_dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}
